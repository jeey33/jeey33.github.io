<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chalet en bois à Soulages-Bonneval - Aveyron</title>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
}

header {
    background-image: url("images/photo1.jpg");
    background-size: cover;
    background-position: center;
    color: white;
    text-align: center;
    padding: 100px 20px;
}

header h1 {
    font-size: 48px;
    background: rgba(0,0,0,0.5);
    display: inline-block;
    padding: 15px;
    border-radius: 10px;
}

section {
    padding: 40px 20px;
    max-width: 1100px;
    margin: auto;
}

.galerie img {
    width: 30%;
    margin: 1%;
    border-radius: 10px;
}

#calendar {
    max-width: 900px;
    margin: 40px auto;
}

form {
    display: flex;
    flex-direction: column;
    max-width: 400px;
    margin: auto;
}

form input, form button {
    margin: 10px 0;
    padding: 10px;
    font-size: 16px;
}

button {
    background-color: #5c8a3e;
    color: white;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: #4a6f30;
}
</style>
</head>

<body>

<header>
<h1>Chalet en Bois à Soulages-Bonneval (Aveyron)</h1>
<p>Nature, calme et authenticité</p>
</header>

<section>
<h2>🌿 Le Chalet</h2>
<p>Magnifique chalet en bois situé à Soulages-Bonneval, au cœur de l'Aveyron.
Capacité : 6 personnes – Terrasse – Vue nature – Parking privé.</p>
</section>

<section>
<h2>📸 Galerie Photos</h2>
<div class="galerie">
    <img src="images/photo1.jpg">
    <img src="images/photo2.jpg">
    <img src="images/photo3.jpg">
</div>
</section>

<section>
<h2>📅 Disponibilités</h2>
<div id='calendar'></div>
</section>

<section>
<h2>🛎 Réservation</h2>
<form action="https://checkout.stripe.com/pay" method="POST">
    <input type="text" name="nom" placeholder="Votre nom" required>
    <input type="email" name="email" placeholder="Votre email" required>
    <input type="date" name="arrivee" required>
    <input type="date" name="depart" required>
    <button type="submit">Réserver et payer</button>
</form>
</section>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');
    var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'fr',
        events: [
            {
                title: 'Réservé',
                start: '2026-07-25',
                end: '2026-07-30',
                color: 'red'
            }
        ]
    });
    calendar.render();
});
</script>

</body>
</html>
